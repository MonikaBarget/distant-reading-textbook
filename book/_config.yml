author: Monika Barget, built with <a href="https://teachbooks.io">TeachBooks</a>

execute:
  execute_notebooks: "off"

html:
  use_multitoc_numbering: true
  extra_footer: ""

sphinx:
  extra_extensions:
    - teachbooks_favourites

  config:

    language: en

    html_js_files:
      - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js

    thebe_config:
      use_thebe_lite: true
      exclude_patterns: ["**/_*.yml", "**/*.md", "**/*.ipynb"]

    html_baseurl: "https://monikabarget.github.io/distant-reading/"

    html_theme_options:

      logo:
        text: Distant Reading
        image_light: logos/logo_light.svg
        image_dark: logos/logo_dark.svg

      repository_url: "https://github.com/MonikaBarget/distant-reading"
      repository_branch: "main"
      path_to_docs: "book"

      use_edit_page_button: true
      use_repository_button: true
      use_issues_button: true

      launch_buttons:
        thebe: true

    html_show_copyright: false

    html_last_updated_fmt: '%B %-d, %Y'

    html_static_path:
      - logos
      - screenshots_distant_reading
      - sample_analyses
      - stopwords

    external_toc_path: "_toc.yml"
    external_toc_exclude_missing: true

teachbooks:
  attribution_location: top

bibtex_bibfiles:
  - references.bib

parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - linkify
    - substitution
    - tasklist
